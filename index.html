<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amaya's Oaths Party</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; height: 400vh; font-family: sans-serif; }
        
        #video-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        #main-video { width: 100%; height: 100%; object-fit: cover; }

        /* Interactive Overlay Elements */
        .interactive-box {
            position: fixed;
            z-index: 100;
            transition: opacity 0.5s ease;
            opacity: 0;
            pointer-events: none;
            cursor: move; /* Shows it's draggable in Edit Mode */
        }
        
        .interactive-box.visible { opacity: 1; pointer-events: auto; }
        
        /* Edit Mode Styles */
        .edit-mode .interactive-box { outline: 2px dashed #3b82f6; opacity: 1; pointer-events: auto; }
        
        #input-box { width: 280px; height: 100px; top: 60%; left: 50%; transform: translate(-50%, -50%); }
        #btn-box { width: 200px; height: 50px; top: 75%; left: 50%; transform: translate(-50%, -50%); }

        textarea { width: 100%; height: 100%; background: transparent; border: 1px solid #ccc; color: white; padding: 10px; border-radius: 8px; resize: none; outline: none; }
    </style>
</head>
<body>

    <div id="video-container">
        <video id="main-video" src="Comp 1.mp4" muted playsinline></video>
    </div>

    <div id="input-box" class="interactive-box">
        <textarea id="rsvp-message" placeholder="Add a wish... (Press Enter)"></textarea>
    </div>

    <button id="btn-box" class="interactive-box" onclick="openRSVPModal()">
        <div class="w-full h-full bg-blue-900/50 rounded-lg flex items-center justify-center text-white font-bold border border-white/20">RSVP</div>
    </button>

    <!-- Footer -->
    <div id="footer-container" class="fixed bottom-4 w-full text-center text-white/70 text-xs font-bold z-50">
        Powered by <a href="https://your-craftgrid-link.com" class="text-blue-400">CRAFTGRID</a><br>
        © 2026 All Right Reserved | Sandusha Avishkha
    </div>

    <script>
        const video = document.getElementById('main-video');
        const inputContainer = document.getElementById('input-box');
        const btnContainer = document.getElementById('btn-box');

        // Scroll Sync Logic
        window.addEventListener('scroll', () => {
            const scrollFraction = window.scrollY / (document.body.scrollHeight - window.innerHeight);
            const frameTime = video.duration * scrollFraction;
            video.currentTime = frameTime;

            // Show elements only at the end (e.g., > 80% scroll)
            if (scrollFraction > 0.8) {
                inputContainer.classList.add('visible');
                btnContainer.classList.add('visible');
            } else {
                inputContainer.classList.remove('visible');
                btnContainer.classList.remove('visible');
            }
        });

        const msgInput = document.getElementById('rsvp-message');
        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if(msgInput.value.trim()) sendData('message', msgInput.value.trim());
            }
        });

        function openRSVPModal() {
            Swal.fire({
                title: 'RSVP Confirmation',
                html: `<div class="flex flex-col gap-2"><label><input type="radio" name="st" value="Attending"> Yes</label><label><input type="radio" name="st" value="Not_Attending"> No</label></div>`,
                preConfirm: () => document.querySelector('input[name="st"]:checked')?.value
            }).then((r) => { if(r.value) sendData('rsvp', r.value); });
        }

        async function sendData(type, val) {
            Swal.fire({ title: 'Sending...', didOpen: () => Swal.showLoading() });
            const id = new URLSearchParams(window.location.search).get('id');
            const params = new URLSearchParams({ action: 'updateRSVP', id, [type]: val });
            
            try {
                await fetch('https://script.google.com/macros/s/AKfycbyi0Nti2-5JTLZ_7LI5d1ROB0JHO7wkVHWJ4Vm5fHrQPxa8ubE9HAJNwLEaNY9M3gGszA/exec', { method: 'POST', mode: 'no-cors', body: params });
                Swal.fire({ icon: 'success', title: 'Thank you!' });
                if(type === 'message') msgInput.value = '';
            } catch(e) { Swal.fire({ icon: 'error', title: 'Failed!' }); }
        }

        // To use: Add ?edit=true to the URL
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('edit') === 'true') {
            document.body.classList.add('edit-mode');
            document.querySelectorAll('.interactive-box').forEach(el => {
                el.setAttribute('draggable', 'true');
                el.addEventListener('dragend', (e) => {
                    el.style.left = e.clientX + 'px';
                    el.style.top = e.clientY + 'px';
                    console.log("New Position: ", el.id, " - Top:", el.style.top, "Left:", el.style.left);
                });
            });
        }
    </script>
</body>
</html>
