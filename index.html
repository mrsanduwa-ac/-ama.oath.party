<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amaya's Oaths Party</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body, html {
            margin: 0; padding: 0; background-color: #000; 
            font-family: 'Inter', sans-serif; overflow: hidden;
            touch-action: none; /* Prevents pull-to-refresh */
            -webkit-touch-callout: none; /* Disable long press on iOS */
            -webkit-user-select: none; user-select: none; /* Disable text selection */
        }

        #loader {
            position: fixed; inset: 0; background: #f8fafc; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }

        #invitation-viewport {
            position: relative; width: 100%; max-width: 450px; height: 100vh; 
            height: 100dvh; margin: 0 auto; background-color: #000; overflow: hidden;
        }

        /* CRITICAL: pointer-events: none completely hides that this is a video from the browser */
        #main-video { 
            width: 100%; height: 100%; object-fit: cover; object-position: center; 
            pointer-events: none; 
        }

        /* Invisible layer to handle touch-to-pause without blocking buttons */
        #touch-layer { position: absolute; inset: 0; z-index: 10; }

        .overlay-box {
            position: absolute; opacity: 0; pointer-events: none;
            transition: opacity 0.6s ease, transform 0.6s ease;
            transform: translateY(20px); z-index: 50;
        }
        .overlay-box.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }

        /* Premium Glass Box UI */
        #rsvp-input-container { top: 58%; left: 7.5%; width: 85%; height: 10%; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(12px);
            border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%; height: 100%; padding: 10px; border: 1px solid rgba(255,255,255,0.8);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .msg-text { font-size: 0.95rem; color: #475569; font-weight: 500; }

        #rsvp-btn-container { top: 71%; left: 20%; width: 60%; height: 6.5%; }
        #rsvp-btn {
            width: 100%; height: 100%; background-color: #0c2b5e; color: white;
            border: none; border-radius: 50px; font-weight: 600; font-size: 0.95rem;
            cursor: pointer; transition: all 0.3s; box-shadow: 0 6px 20px rgba(12, 43, 94, 0.3);
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        #rsvp-btn:active { transform: scale(0.96); }
        #rsvp-btn:disabled { cursor: not-allowed; transform: none; }

        /* Map Links - Guaranteed to work now */
        #map-icon-link { top: 35%; left: 70%; width: 18%; height: 8%; }
        #map-text-link { top: 45%; left: 15%; width: 70%; height: 6%; }
        .map-anchor { display: block; width: 100%; height: 100%; cursor: pointer; }
        
        /* Blur Box Watermark */
        #footer-container {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 80%; text-align: center; font-size: 0.7rem; color: rgba(255,255,255,0.9); 
            z-index: 60; font-weight: 600; padding: 10px; border-radius: 12px;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1);
            opacity: 0; pointer-events: none; transition: opacity 0.8s ease;
        }
        #footer-container.visible { opacity: 1; pointer-events: auto; }
        #footer-container a { color: #93c5fd; text-decoration: none; font-weight: 700;}

        /* Replay Button */
        #replay-btn {
            position: absolute; top: 20px; right: 20px; z-index: 100;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            color: white; border: none; border-radius: 50%; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #replay-btn.visible { opacity: 1; pointer-events: auto; }

        /* Open Button */
        #open-btn {
            background: #0c2b5e; color: white; padding: 12px 30px; border-radius: 50px;
            font-weight: 600; margin-top: 30px; opacity: 0; transform: scale(0.9);
            transition: all 0.5s; cursor: pointer; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(12, 43, 94, 0.3);
        }
        #open-btn.ready { opacity: 1; transform: scale(1); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(12,43,94,0.4); } 70% { box-shadow: 0 0 0 15px rgba(12,43,94,0); } 100% { box-shadow: 0 0 0 0 rgba(12,43,94,0); } }

        .swal2-popup { background: #ffffff !important; color: #1e293b !important; border-radius: 20px !important; }
        .swal2-title { color: #0f172a !important; }
    </style>
</head>
<body>

    <div id="loader">
        <div id="loading-animation">
            <div class="w-24 h-48 bg-slate-200 rounded-lg mb-8 opacity-50 animate-pulse mx-auto"></div>
            <p class="text-slate-500 font-medium text-sm flex items-center justify-center gap-2">
                <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Preparing Invitation...
            </p>
        </div>
        <button id="open-btn" onclick="startExperience()" style="display: none;">
            <i data-lucide="mail-open" class="w-5 h-5"></i> Tap to Open Invitation
        </button>
    </div>

    <div id="invitation-viewport">
        
        <!-- Video completely locked down from browser features -->
        <video id="main-video" src="Comp 1.mp4" playsinline webkit-playsinline disablePictureInPicture controlsList="nodownload nofullscreen noremoteplayback"></video>
        <audio id="bgm" src="song.mp3" loop></audio>

        <!-- Touch layer for play/pause -->
        <div id="touch-layer"></div>

        <button id="replay-btn" onclick="replayVideo()"><i data-lucide="rotate-ccw" class="w-6 h-6"></i></button>

        <!-- Map Links (Using Anchor tags for guaranteed clicks) -->
        <div id="map-icon-link" class="overlay-box">
            <a href="https://maps.app.goo.gl/amWMheWCpM67DzFR8" target="_blank" class="map-anchor"></a>
        </div>
        <div id="map-text-link" class="overlay-box">
            <a href="https://maps.app.goo.gl/amWMheWCpM67DzFR8" target="_blank" class="map-anchor"></a>
        </div>

        <div id="rsvp-input-container" class="overlay-box" onclick="openMessagePopup()">
            <div class="glass-panel" id="msg-panel">
                <span class="msg-text" id="msg-display">Tap to add a wish...</span>
            </div>
        </div>

        <div id="rsvp-btn-container" class="overlay-box">
            <button id="rsvp-btn" onclick="openRSVPModal()">RSVP</button>
        </div>

        <div id="footer-container">
            Powered by <a href="https://www.facebook.com/sandu.malli2/" target="_blank">CRAFTGRID</a><br>
            © 2026 All Right Reserved | Sandusha Avishkha
        </div>

    </div>

    <script>
        lucide.createIcons();

        // =========================================================================
        const TIMES = {
            MAP_LINKS: 4.2,   // මැප් අයිකන් සහ හෝටල් නම පෙන්නන වෙලාව
            RSVP_FORMS: 8.5   // RSVP බටන් එකයි Message එකයි පෙන්නන වෙලාව
        };
        // =========================================================================

        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyi0Nti2-5JTLZ_7LI5d1ROB0JHO7wkVHWJ4Vm5fHrQPxa8ubE9HAJNwLEaNY9M3gGszA/exec';
        
        const video = document.getElementById('main-video');
        const bgm = document.getElementById('bgm');
        const loader = document.getElementById('loader');
        const openBtn = document.getElementById('open-btn');
        const loadingAnim = document.getElementById('loading-animation');
        const touchLayer = document.getElementById('touch-layer');
        
        const mapIconBox = document.getElementById('map-icon-link');
        const mapTextBox = document.getElementById('map-text-link');
        const inputBox = document.getElementById('rsvp-input-container');
        const btnBox = document.getElementById('rsvp-btn-container');
        const footer = document.getElementById('footer-container');
        const replayBtn = document.getElementById('replay-btn');
        
        const msgDisplay = document.getElementById('msg-display');
        const rsvpBtn = document.getElementById('rsvp-btn');
        
        let guestId = '';
        let guestData = { name: 'Valued Guest', rsvp: 'Pending', message: '' };
        let isFinished = false;

        window.addEventListener('load', async () => {
            guestId = new URLSearchParams(window.location.search).get('id');

            if (guestId) {
                try {
                    const res = await fetch(`${SCRIPT_URL}?action=getGuest&id=${guestId}`);
                    const data = await res.json();
                    if (data && data.name) {
                        guestData = data;
                        checkAndLockUI();
                        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: new URLSearchParams({ action: 'markOpened', id: guestId }) });
                    }
                } catch(e) {}
            }

            video.addEventListener('canplaythrough', () => {
                setTimeout(() => {
                    loadingAnim.style.display = 'none';
                    openBtn.style.display = 'flex';
                    setTimeout(() => openBtn.classList.add('ready'), 50);
                }, 1000);
            });
            video.load();
        });

        function startExperience() {
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
                video.play();
                bgm.play();
            }, 800);
        }

        // 🟢 Video Timeline Logic - FIXED: Elements do not disappear at the end!
        video.addEventListener('timeupdate', () => {
            const t = video.currentTime;

            if (t > TIMES.MAP_LINKS) { 
                mapIconBox.classList.add('visible'); 
                mapTextBox.classList.add('visible'); 
            } 

            if (t > TIMES.RSVP_FORMS) { 
                inputBox.classList.add('visible'); 
                btnBox.classList.add('visible'); 
            } 

            if (t >= video.duration - 0.2 && !isFinished) {
                isFinished = true;
                video.pause();
                bgm.pause();
                
                // ONLY show footer and replay at the end. Do NOT hide boxes.
                setTimeout(() => {
                    replayBtn.classList.add('visible');
                    footer.classList.add('visible');
                }, 300);
            }
        });

        function replayVideo() {
            isFinished = false;
            replayBtn.classList.remove('visible');
            footer.classList.remove('visible');
            
            // Hide elements before restarting
            mapIconBox.classList.remove('visible'); mapTextBox.classList.remove('visible');
            inputBox.classList.remove('visible'); btnBox.classList.remove('visible');
            
            video.currentTime = 0;
            bgm.currentTime = 0;
            video.play();
            bgm.play();
        }

        // 🟢 HOLD TO PAUSE LOGIC
        const pauseMedia = () => { if(!isFinished) { video.pause(); bgm.pause(); } };
        const playMedia = () => { if(!isFinished) { video.play(); bgm.play(); } };

        touchLayer.addEventListener('mousedown', pauseMedia);
        touchLayer.addEventListener('mouseup', playMedia);
        touchLayer.addEventListener('touchstart', pauseMedia, {passive: true});
        touchLayer.addEventListener('touchend', playMedia);

        function checkAndLockUI() {
            if (guestData.rsvp === 'Attending' || guestData.rsvp === 'Not_Attending') {
                rsvpBtn.innerHTML = `<i data-lucide="check-circle-2" class="w-5 h-5"></i> Thank You!`;
                rsvpBtn.className = "w-full h-full bg-emerald-600 text-white border-none rounded-full font-bold text-[0.95rem] flex justify-center items-center gap-2 shadow-lg";
                rsvpBtn.disabled = true;
                rsvpBtn.parentElement.style.pointerEvents = 'none';
            }
            if (guestData.message && guestData.message.trim() !== '') {
                msgDisplay.innerHTML = `<span class="text-emerald-700 font-bold"><i data-lucide="check" class="w-4 h-4 inline"></i> Message Sent</span>`;
                document.getElementById('rsvp-input-container').style.pointerEvents = 'none';
            }
            lucide.createIcons();
        }

        function openMessagePopup() {
            Swal.fire({
                title: 'Leave a Wish',
                input: 'textarea',
                inputPlaceholder: 'Type your message here...',
                showCancelButton: true,
                confirmButtonText: 'Send Message',
                confirmButtonColor: '#0c2b5e',
                customClass: { popup: 'swal2-popup' }
            }).then((res) => {
                if (res.isConfirmed && res.value.trim() !== '') {
                    sendInlineData('message', res.value.trim());
                }
            });
        }

        function openRSVPModal() {
            if (!guestId) { Swal.fire('Error', 'Invalid Link', 'warning'); return; }
            const displayName = `${guestData.title || ''} ${guestData.name}`;

            Swal.fire({
                title: 'RSVP Confirmation',
                html: `
                    <div class="mb-5 mt-2 bg-slate-50 p-3 rounded-lg border border-slate-200">
                        <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-1">Invited Guest</p>
                        <h4 class="text-lg font-bold text-blue-900">${displayName}</h4>
                    </div>
                    <div class="flex flex-col gap-3 text-left">
                        <label class="flex items-center gap-3 p-4 border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-50">
                            <input type="radio" name="rsvp_st" value="Attending" class="w-5 h-5 accent-emerald-600">
                            <span class="font-medium text-slate-700">Yes, I will attend</span>
                        </label>
                        <label class="flex items-center gap-3 p-4 border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-50">
                            <input type="radio" name="rsvp_st" value="Not_Attending" class="w-5 h-5 accent-rose-600">
                            <span class="font-medium text-slate-700">Sorry, I can't make it</span>
                        </label>
                    </div>
                `,
                showCancelButton: true, confirmButtonText: 'Submit', confirmButtonColor: '#0c2b5e',
                customClass: { popup: 'swal2-popup' },
                preConfirm: () => {
                    const sel = document.querySelector('input[name="rsvp_st"]:checked');
                    if (!sel) { Swal.showValidationMessage('Please select an option'); return false; }
                    return sel.value;
                }
            }).then((res) => {
                if (res.isConfirmed) sendInlineData('rsvp', res.value);
            });
        }

        async function sendInlineData(type, val) {
            const params = new URLSearchParams({ action: 'updateRSVP', id: guestId });
            params.append(type === 'message' ? 'message' : 'rsvp', val);

            if (type === 'message') {
                msgDisplay.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin inline"></i> Sending...`;
                msgDisplay.style.color = '#0c2b5e';
            } else {
                rsvpBtn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin inline"></i> Updating...`;
                rsvpBtn.disabled = true;
            }
            lucide.createIcons();

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: params });
                if (type === 'message') guestData.message = val;
                if (type === 'rsvp') guestData.rsvp = val;
                setTimeout(() => checkAndLockUI(), 500);
            } catch(e) {
                if (type === 'message') msgDisplay.innerHTML = `Try again...`;
                else { rsvpBtn.innerHTML = 'RSVP'; rsvpBtn.disabled = false; }
                Swal.fire('Error', 'Please try again', 'error');
            }
        }
    </script>
</body>
</html>
