<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amaya's Oaths Party (Group Invite)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body, html {
            margin: 0; padding: 0; background-color: #000; 
            font-family: 'Inter', sans-serif; overflow: hidden;
            touch-action: none; -webkit-touch-callout: none; user-select: none;
        }

        /* Skeleton Loader (No Text) */
        #loader {
            position: fixed; inset: 0; background: #f8fafc; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }

        #invitation-viewport {
            position: relative; width: 100%; max-width: 450px; height: 100vh; 
            height: 100dvh; margin: 0 auto; background-color: #000; overflow: hidden;
        }

        /* Video element locked down */
        #main-video { 
            width: 100%; height: 100%; object-fit: cover; object-position: center; 
            pointer-events: none; 
        }

        .overlay-box {
            position: absolute; opacity: 0; pointer-events: none;
            transition: opacity 0.6s ease, transform 0.6s ease;
            transform: translateY(20px); z-index: 50;
        }
        .overlay-box.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }

        /* Custom HTML UI */
        #rsvp-input-container { top: 58%; left: 7.5%; width: 85%; height: 10%; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px);
            border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%; height: 100%; padding: 10px; border: 1px solid rgba(255,255,255,0.8);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .msg-text { font-size: 0.95rem; color: #475569; font-weight: 500; }

        #rsvp-btn-container { top: 71%; left: 20%; width: 60%; height: 6.5%; }
        #rsvp-btn {
            width: 100%; height: 100%; background-color: #0c2b5e; color: white;
            border: none; border-radius: 50px; font-weight: 600; font-size: 0.95rem;
            cursor: pointer; transition: all 0.3s; box-shadow: 0 6px 20px rgba(12, 43, 94, 0.3);
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        #rsvp-btn:active { transform: scale(0.96); }

        /* Map Links */
        #map-icon-link { top: 35%; left: 70%; width: 18%; height: 8%; }
        #map-text-link { top: 45%; left: 15%; width: 70%; height: 6%; }
        .map-anchor { display: block; width: 100%; height: 100%; cursor: pointer; }
        
        /* Footer Watermark */
        #footer-container {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            width: 80%; text-align: center; font-size: 0.7rem; color: rgba(255,255,255,0.9); 
            z-index: 60; font-weight: 600; padding: 10px; border-radius: 12px;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1);
            opacity: 0; pointer-events: none; transition: opacity 0.8s ease;
        }
        #footer-container.visible { opacity: 1; pointer-events: auto; }
        #footer-container a { color: #93c5fd; text-decoration: none; font-weight: 700;}

        /* Top Right Glassy Control Button (Play/Pause/Replay) */
        #media-control-btn {
            position: absolute; top: 20px; right: 20px; z-index: 100;
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.4); color: #ffffff;
            border-radius: 50%; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.5s ease; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #media-control-btn.visible { opacity: 1; pointer-events: auto; }

        /* Start Interaction Overlay (Swipe Up) */
        #start-overlay {
            position: absolute; inset: 0; z-index: 90;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding-bottom: 20%; background: transparent; cursor: pointer;
            opacity: 0; transition: opacity 0.5s ease; pointer-events: none;
        }
        #start-overlay.visible { opacity: 1; pointer-events: auto; }
        .scroll-icon { animation: bounce 2s infinite; color: rgba(255,255,255,0.8); text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-20px); } 60% { transform: translateY(-10px); } }

        /* Force Light Theme in Swal2 */
        .swal2-popup { background-color: #ffffff !important; color: #1e293b !important; border-radius: 20px !important; }
        .swal2-title { color: #0f172a !important; }
        .custom-input { width: 90% !important; margin: 0 auto 10px auto !important; }
    </style>
</head>
<body>

    <!-- Skeleton Loader (No Text) -->
    <div id="loader">
        <div class="w-24 h-48 bg-slate-200 rounded-lg mb-8 opacity-50 animate-pulse mx-auto"></div>
        <div class="w-48 h-6 bg-slate-200 rounded opacity-50 animate-pulse mx-auto"></div>
    </div>

    <!-- Main Viewport -->
    <div id="invitation-viewport">
        
        <video id="main-video" src="Comp 1.mp4" playsinline webkit-playsinline muted></video>
        <audio id="bgm" src="song.mp3" loop></audio>

        <!-- Initial Interaction Overlay -->
        <div id="start-overlay">
            <div class="scroll-icon flex flex-col items-center">
                <i data-lucide="chevrons-up" class="w-8 h-8 mb-2"></i>
                <span class="text-xs font-bold uppercase tracking-widest">Swipe up to view</span>
            </div>
        </div>

        <!-- Glassy Top Right Controls -->
        <button id="media-control-btn" onclick="toggleMedia()">
            <i data-lucide="pause" id="media-icon" class="w-5 h-5"></i>
        </button>

        <!-- Map Links -->
        <div id="map-icon-link" class="overlay-box click-area">
            <a href="https://maps.app.goo.gl/amWMheWCpM67DzFR8" target="_blank" class="map-anchor"></a>
        </div>
        <div id="map-text-link" class="overlay-box click-area">
            <a href="https://maps.app.goo.gl/amWMheWCpM67DzFR8" target="_blank" class="map-anchor"></a>
        </div>

        <!-- Group Message Box -->
        <div id="rsvp-input-container" class="overlay-box click-area" onclick="openGroupMessagePopup()">
            <div class="glass-panel">
                <span class="msg-text" id="msg-display">Tap to add a wish...</span>
            </div>
        </div>

        <!-- Group RSVP Button (CALL) -->
        <div id="rsvp-btn-container" class="overlay-box click-area">
            <button id="rsvp-btn" onclick="handleGroupCall()">
                <i data-lucide="phone" class="w-4 h-4"></i> RSVP (Call)
            </button>
        </div>

        <!-- Footer Watermark -->
        <div id="footer-container">
            Powered by <a href="https://www.facebook.com/sandu.malli2/" target="_blank">CRAFTGRID</a><br>
            © 2026 All Right Reserved | Sandusha Avishkha
        </div>

    </div>

    <!-- Scripts -->
    <script>
        lucide.createIcons();

        const TIMES = { MAP_LINKS: 4.2, RSVP_FORMS: 8.5 };
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz-RcIL7t3MyfXE5qcQMjoW9YiNWjpTYFuSaA8D9DUrS_sH8RrPASeAfzBuLemH8d9Y4g/exec';
        
        const video = document.getElementById('main-video');
        const bgm = document.getElementById('bgm');
        const loader = document.getElementById('loader');
        const startOverlay = document.getElementById('start-overlay');
        const mediaControlBtn = document.getElementById('media-control-btn');
        const mediaIcon = document.getElementById('media-icon');
        
        const mapIconBox = document.getElementById('map-icon-link');
        const mapTextBox = document.getElementById('map-text-link');
        const inputBox = document.getElementById('rsvp-input-container');
        const btnBox = document.getElementById('rsvp-btn-container');
        const footer = document.getElementById('footer-container');
        const msgDisplay = document.getElementById('msg-display');
        
        let isFinished = false;
        let isPlaying = false;
        let messageSent = false;

        // On Load: Track Open & Prepare Media
        window.addEventListener('load', () => {
            // Track group open silently
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: new URLSearchParams({ action: 'trackGroupOpen' }) });
            
            video.addEventListener('canplaythrough', () => {
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                        startOverlay.classList.add('visible'); // Show Swipe Up instruction
                    }, 800);
                }, 1000);
            });
            video.load();
        });

        // Start Experience on Swipe/Touch
        startOverlay.addEventListener('pointerdown', () => {
            startOverlay.classList.remove('visible');
            video.play();
            bgm.play();
            isPlaying = true;
            mediaControlBtn.classList.add('visible'); // Show control button
        });

        // Video Timeline Logic
        video.addEventListener('timeupdate', () => {
            const t = video.currentTime;

            if (t > TIMES.MAP_LINKS) { mapIconBox.classList.add('visible'); mapTextBox.classList.add('visible'); } 
            if (t > TIMES.RSVP_FORMS) { inputBox.classList.add('visible'); btnBox.classList.add('visible'); } 

            // End of Video
            if (t >= video.duration - 0.2 && !isFinished) {
                isFinished = true;
                isPlaying = false;
                video.pause();
                bgm.pause();
                
                // Keep boxes visible, just show footer and change icon to Replay
                footer.classList.add('visible');
                updateMediaIcon('rotate-ccw');
            }
        });

        // Play / Pause / Replay Button Logic
        function toggleMedia() {
            if (isFinished) {
                // Replay
                isFinished = false;
                footer.classList.remove('visible');
                video.currentTime = 0;
                bgm.currentTime = 0;
                
                // Briefly hide UI elements so they fade in again
                mapIconBox.classList.remove('visible'); mapTextBox.classList.remove('visible');
                inputBox.classList.remove('visible'); btnBox.classList.remove('visible');
                
                video.play();
                bgm.play();
                isPlaying = true;
                updateMediaIcon('pause');
            } else {
                // Play / Pause Toggle
                if (isPlaying) {
                    video.pause(); bgm.pause();
                    isPlaying = false;
                    updateMediaIcon('play');
                } else {
                    video.play(); bgm.play();
                    isPlaying = true;
                    updateMediaIcon('pause');
                }
            }
        }

        function updateMediaIcon(iconName) {
            mediaIcon.setAttribute('data-lucide', iconName);
            lucide.createIcons();
        }

        // Group Call RSVP Function
        function handleGroupCall() {
            // Track click in backend
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: new URLSearchParams({ action: 'trackGroupRSVP' }) });
            // Initiate Phone Call
            window.location.href = 'tel:+94762260519';
        }

        // Group Message Function (Asks for Name)
        function openGroupMessagePopup() {
            if (messageSent) return; // Prevent multiple submits

            Swal.fire({
                title: 'Leave a Wish',
                html: `
                    <div class="mb-3 text-left px-2">
                        <label class="text-xs font-bold text-slate-500 uppercase">Your Name</label>
                        <input id="swal-input-name" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g. Nimal Silva" required>
                    </div>
                    <div class="mb-1 text-left px-2">
                        <label class="text-xs font-bold text-slate-500 uppercase">Message</label>
                        <textarea id="swal-input-msg" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="Type your message here..." style="height: 100px;" required></textarea>
                    </div>
                `,
                showCancelButton: true, confirmButtonText: 'Send Message', confirmButtonColor: '#0c2b5e',
                customClass: { popup: 'swal2-popup' },
                preConfirm: () => {
                    const name = document.getElementById('swal-input-name').value.trim();
                    const msg = document.getElementById('swal-input-msg').value.trim();
                    if (!name || !msg) { Swal.showValidationMessage('Please enter both Name and Message'); return false; }
                    return { name: name, message: msg };
                }
            }).then((res) => {
                if (res.isConfirmed) {
                    sendGroupData(res.value.name, res.value.message);
                }
            });
        }

        // Send Data to Group Messages Sheet
        async function sendGroupData(name, msg) {
            msgDisplay.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin inline"></i> Sending...`;
            msgDisplay.style.color = '#0c2b5e';
            lucide.createIcons();

            try {
                await fetch(SCRIPT_URL, { 
                    method: 'POST', mode: 'no-cors', 
                    body: new URLSearchParams({ action: 'addGroupMessage', name: name, message: msg }) 
                });
                
                messageSent = true;
                msgDisplay.innerHTML = `<span class="text-emerald-700 font-bold"><i data-lucide="check" class="w-4 h-4 inline"></i> Message Sent</span>`;
                document.getElementById('rsvp-input-container').style.pointerEvents = 'none';
                lucide.createIcons();
                
                Swal.fire({
                    icon: 'success', title: 'Thank You!',
                    text: 'Your message has been sent successfully.',
                    confirmButtonColor: '#059669', customClass: { popup: 'swal2-popup' }
                });

            } catch(e) {
                msgDisplay.innerHTML = `Try again...`;
                Swal.fire({ icon: 'error', title: 'Failed', text: 'Please try again.', customClass: { popup: 'swal2-popup' }});
            }
        }
    </script>
</body>
</html>
